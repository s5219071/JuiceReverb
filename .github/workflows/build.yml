name: Build JuiceReverb VST3

# ==============================================================================
# GitHub Actions 빌드 워크플로우
#
# 이 파일은 GitHub 서버에서 Windows VST3와 macOS Universal VST3를 자동 빌드합니다.
# 사용자의 로컬 컴퓨터에 JUCE가 설치되어 있지 않아도 CMake가 JUCE를 내려받습니다.
#
# 실행 방법:
# - GitHub 저장소의 Actions 탭에서 "Build JuiceReverb VST3"를 수동 실행합니다.
# - main/master 브랜치에 push하면 자동으로 빌드합니다.
# - v1.0.0 같은 태그를 push하면 GitHub Release도 만들 수 있습니다.
# ==============================================================================

on:
  workflow_dispatch:
    inputs:
      publish_release:
        description: "Build and publish a GitHub Release"
        required: true
        default: false
        type: boolean
      release_tag:
        description: "Release tag used when publish_release is true"
        required: true
        default: "v1.0.0"
        type: string

  push:
    branches:
      - main
      - master
    tags:
      - "v*"

  pull_request:
    branches:
      - main
      - master

permissions:
  contents: write

jobs:
  build-windows-vst3:
    name: Build Windows VST3
    runs-on: windows-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Show build tools
        shell: pwsh
        run: |
          cmake --version

      - name: Configure CMake
        shell: pwsh
        run: |
          cmake -S . -B build -G "Visual Studio 17 2022" -A x64

      - name: Build VST3
        shell: pwsh
        run: |
          cmake --build build --config Release --target JuiceReverb_VST3 --parallel

      - name: Package Windows VST3
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"

          $vst3 = Get-ChildItem -Path "build" -Recurse -Directory -Filter "JuiceReverb.vst3" | Select-Object -First 1

          if ($null -eq $vst3) {
            Write-Host "Build folder contents:"
            Get-ChildItem -Path "build" -Recurse | Select-Object -ExpandProperty FullName
            throw "JuiceReverb.vst3 was not found."
          }

          New-Item -ItemType Directory -Force -Path "artifacts" | Out-Null
          New-Item -ItemType Directory -Force -Path "dist" | Out-Null

          Copy-Item -LiteralPath $vst3.FullName -Destination "artifacts" -Recurse -Force
          Compress-Archive -Path "artifacts/JuiceReverb.vst3" -DestinationPath "dist/JuiceReverb-Windows-VST3.zip" -Force

      - name: Upload Windows VST3 artifact
        uses: actions/upload-artifact@v4
        with:
          name: JuiceReverb-Windows-VST3
          path: dist/JuiceReverb-Windows-VST3.zip
          if-no-files-found: error
          retention-days: 14

  build-macos-vst3:
    name: Build macOS Universal VST3
    runs-on: macos-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Show build tools
        shell: bash
        run: |
          cmake --version
          xcodebuild -version

      - name: Configure CMake
        shell: bash
        run: |
          cmake -S . -B build -G Xcode -DCMAKE_OSX_ARCHITECTURES="arm64;x86_64"

      - name: Build VST3
        shell: bash
        run: |
          cmake --build build --config Release --target JuiceReverb_VST3 --parallel

      - name: Package macOS VST3
        shell: bash
        run: |
          set -euo pipefail

          vst3="$(find build -type d -name 'JuiceReverb.vst3' -print -quit)"

          if [[ -z "${vst3}" ]]; then
            echo "Build folder contents:"
            find build -maxdepth 6 -print
            echo "JuiceReverb.vst3 was not found."
            exit 1
          fi

          mkdir -p artifacts dist
          cp -R "${vst3}" artifacts/

          # 공개 CI에는 Apple Developer ID 인증서가 없으므로 ad-hoc codesign만 적용합니다.
          # 상업 배포 단계에서는 Apple notarization을 추가하는 것이 좋습니다.
          codesign --force --deep --sign - "artifacts/JuiceReverb.vst3"
          codesign --verify --deep --strict "artifacts/JuiceReverb.vst3"

          ditto -c -k --sequesterRsrc --keepParent "artifacts/JuiceReverb.vst3" "dist/JuiceReverb-macOS-Universal-VST3.zip"

      - name: Upload macOS VST3 artifact
        uses: actions/upload-artifact@v4
        with:
          name: JuiceReverb-macOS-Universal-VST3
          path: dist/JuiceReverb-macOS-Universal-VST3.zip
          if-no-files-found: error
          retention-days: 14

  publish-release:
    name: Publish GitHub Release
    runs-on: ubuntu-latest
    needs:
      - build-windows-vst3
      - build-macos-vst3
    if: startsWith(github.ref, 'refs/tags/v') || (github.event_name == 'workflow_dispatch' && inputs.publish_release == true)

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: Show release files
        shell: bash
        run: |
          find dist -maxdepth 2 -type f -print

      - name: Create or update GitHub Release
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_REPO: ${{ github.repository }}
          WORKFLOW_RELEASE_TAG: ${{ inputs.release_tag }}
        run: |
          set -euo pipefail

          if [[ "${GITHUB_REF}" == refs/tags/* ]]; then
            tag="${GITHUB_REF_NAME}"
          else
            tag="${WORKFLOW_RELEASE_TAG}"
          fi

          if gh release view "${tag}" --repo "${GH_REPO}" >/dev/null 2>&1; then
            gh release upload "${tag}" dist/*.zip --repo "${GH_REPO}" --clobber
          else
            gh release create "${tag}" dist/*.zip \
              --repo "${GH_REPO}" \
              --target "${GITHUB_SHA}" \
              --title "JuiceReverb ${tag}" \
              --notes "Windows VST3 and macOS Universal VST3 builds for JuiceReverb."
          fi
